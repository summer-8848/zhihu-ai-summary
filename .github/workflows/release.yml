name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package extension as ZIP
        run: |
          cd packages/extension/dist
          # Best compression + exclude dev/build-only files
          zip -r -9 ../../../extension.zip . \
            -x "*.map" \
            -x ".vite/*" \
            -x "**/.vite/*" \
            -x "**/.DS_Store" \
            -x "__MACOSX/*"
          cd ../../../

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 版本 ${{ steps.get_version.outputs.VERSION }}
            
            查看 [CHANGELOG.md](https://github.com/summer-8848/zhihu-ai-summary/blob/main/CHANGELOG.md) 了解详细更新内容。
            
            ### 📦 下载方式
            
            #### 油猴脚本
            点击下方 Assets 中的 `zhihu-ai-summary.user.js` 文件，会自动提示安装到油猴扩展中。
            
            #### 浏览器扩展
            1. 下载下方 Assets 中的 `extension.zip` 文件
            2. 解压到本地文件夹
            3. 打开 Chrome 扩展管理页面 (chrome://extensions/)
            4. 开启"开发者模式"
            5. 点击"加载已解压的扩展程序"，选择解压后的文件夹
          files: |
            packages/userscript/dist/*.user.js
            extension.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "✅ 版本 ${{ steps.get_version.outputs.VERSION }} 已发布到 GitHub Release"
          echo "📦 记得同步更新 GreasyFork: https://greasyfork.org/zh-CN/scripts/559782"
